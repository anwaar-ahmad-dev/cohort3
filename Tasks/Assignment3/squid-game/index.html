<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="overlay"></div>
        <!-- glow effects -->
        <div class="glow-red"></div>
        <div class="glow-purple"></div>
        <!-- navbar section -->
        <nav>
            <img src="./img/logo.png" alt="">
            <div class="nav-links">
                <h3>About</h3>
                <h3>Watch now</h3>
                <h3>Actors</h3>
                <h3>Contact</h3>
            </div>
            <i class="ri-menu-3-line"></i>
        </nav>

        <!-- Hero main section -->
        <div class="hero">
            <div class="left">
                <div class="details">
                    <img src="./img/logo.png" alt="">

                    <p>Action/ Thriller/ Drama series directed by Dong-hyuk Hwang <br>
                        Season 1:9 Episodes
                    </p>
                    <div class="buttons">
                        <button id="play"> <i class="ri-play-circle-fill"></i> Play Now</button>
                        <button id="trailer"> <i class="ri-play-mini-line"></i>Watch Trailer</button>
                    </div>
                </div>
                <h1>Game</h1>
            </div>
            <div class="right">
                <div class="icons">
                    <i class="ri-twitter-line"></i>
                    <i class="ri-instagram-line"></i>
                    <i class="ri-facebook-line"></i>
                </div>
                <p>SCROLL</p>
                <img src="./img/guard.png" alt="">
                <h1>Squid</h1>
            </div>
        </div>

        <!-- cards -->
        <div class="card-container">
            <div class="card"><i class="ri-play-large-fill"></i></div>
            <div class="card"><i class="ri-play-large-fill"></i></div>
            <div class="card"><i class="ri-play-large-fill"></i></div>
        </div>
    </main>

</body>

</html>
