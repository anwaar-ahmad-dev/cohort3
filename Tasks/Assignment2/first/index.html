<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2-first</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="mobile-text">
        <h1>This Page can only be seen in Desktop.</h1>
    </div>
    <main>

        <nav>
            <div id="logo">
                <img src="./logo.png" alt="logo-image">
                <h3>ScaleX</h3>
            </div>
            <div id="nav-links">
                <a href="#">Home</a>
                <a href="#">About Us</a>
                <a href="#">Blogs</a>
                <a href="#">Contact Us</a>
            </div>
            <button class="get-started">Get Started</button>
        </nav>
        <!-- Main Text -->
        <h1 id="main-text">Insights & Blogs</h1>

        <!-- Category buttons -->
        <div id="category">
            <button>All</button>
            <button>Tech</button>
            <button>SaaS</button>
            <button>Marketing</button>
        </div>

        <div id="card-container">
            <div class="card">
                <div class="card-img">
                    <img src="./drink.webp" alt="drink-img">
                </div>
                <div class="card-content">
                    <span class="card-category">Tech</span>
                    <h3 class="card-title">The Ultimate Guide to SaaS Marketing</h3>
                    <p class="card-date">May 23,2025</p>
                </div>
            </div>
            <div class="card">
                <div class="card-img">
                    <img src="./chair.avif" alt="chair-img">
                </div>
                <div class="card-content">
                    <span class="card-category">SaaS</span>
                    <h3 class="card-title">5 Key trends in SaaS Growth For 2025</h3>
                    <p class="card-date">May 23,2025</p>
                </div>
            </div>
            <div class="card">
                <div class="card-img">
                    <img src="./cat.jpg" alt="cat-img">
                </div>
                <div class="card-content">
                    <span class="card-category">Marketing</span>
                    <h3 class="card-title">How Data Driven Strategies Are Important</h3>
                    <p class="card-date">May 23,2025</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
